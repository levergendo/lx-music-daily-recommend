<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推荐设置</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="main.js"></script>
  <div id="app">
    <h1>⚙️ 推荐设置</h1>
    
    <div class="form-group">
      <label>每日推荐数量: <span id="dailyCountValue">20</span> 首</label>
      <input type="range" id="dailyCount" min="10" max="50" value="20">
    </div>
    
    <div class="form-group">
      <label>种子歌曲数量:</label>
      <input type="number" id="seedCount" min="3" max="10" value="5">
    </div>
    
    <div class="form-group">
      <label>同一歌手最多推荐:</label>
      <input type="number" id="maxArtist" min="1" max="3" value="1">
    </div>
    
    <div class="form-group">
      <label>推荐模式:</label>
      <select id="recommendMode">
        <option value="mixed">混合</option>
        <option value="discover">发现</option>
        <option value="familiar">熟悉</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>推荐引擎:</label>
      <select id="engineSelect">
        <option value="default">默认引擎</option>
      </select>
    </div>
    
    <div class="form-group">
      <label class="toggle-label">
        <input type="checkbox" id="autoPlay">
        <span class="toggle"></span>
        生成后自动播放
      </label>
    </div>
    
    <button id="saveBtn">保存设置</button>
    <p id="message"></p>
    
    <p><a href="index.html">← 返回首页</a></p>
  </div>
  
  <script>
    const defaultSettings = {
      dailyCount: 20,
      seedCount: 5,
      maxArtist: 1,
      recommendMode: 'mixed',
      autoPlay: false,
      engineName: 'default'
    };

    function loadSettings() {
      const saved = localStorage.getItem('smartRecommendSettings');
      if (saved) {
        return { ...defaultSettings, ...JSON.parse(saved) };
      }
      return defaultSettings;
    }

    function saveSettings(settings) {
      localStorage.setItem('smartRecommendSettings', JSON.stringify(settings));
    }

    function initEngineSelect() {
      const engineSelect = document.getElementById('engineSelect');
      const engines = (typeof window !== 'undefined' && window.SmartRecommend?.engines) || {
        default: { name: '默认引擎' }
      };
      
      engineSelect.innerHTML = '';
      
      for (const [key, engine] of Object.entries(engines)) {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = engine.name || key;
        engineSelect.appendChild(option);
      }
    }

    function initForm() {
      const settings = loadSettings();
      
      initEngineSelect();
      
      document.getElementById('dailyCount').value = settings.dailyCount;
      document.getElementById('dailyCountValue').textContent = settings.dailyCount;
      document.getElementById('seedCount').value = settings.seedCount;
      document.getElementById('maxArtist').value = settings.maxArtist;
      document.getElementById('recommendMode').value = settings.recommendMode;
      document.getElementById('engineSelect').value = settings.engineName;
      document.getElementById('autoPlay').checked = settings.autoPlay;
    }

    document.getElementById('dailyCount').addEventListener('input', function() {
      document.getElementById('dailyCountValue').textContent = this.value;
    });

    document.getElementById('saveBtn').addEventListener('click', function() {
      const settings = {
        dailyCount: parseInt(document.getElementById('dailyCount').value),
        seedCount: parseInt(document.getElementById('seedCount').value),
        maxArtist: parseInt(document.getElementById('maxArtist').value),
        recommendMode: document.getElementById('recommendMode').value,
        engineName: document.getElementById('engineSelect').value,
        autoPlay: document.getElementById('autoPlay').checked
      };
      
      saveSettings(settings);
      
      const message = document.getElementById('message');
      message.textContent = '设置已保存';
      message.className = 'success';
      
      setTimeout(() => {
        message.textContent = '';
        message.className = '';
      }, 2000);
    });

    initForm();
  </script>
</body>
</html>
